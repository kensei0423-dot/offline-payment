<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商户收款 — Offline Payment</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 40px 16px; }
    .container { max-width: 480px; width: 100%; }
    h1 { text-align: center; font-size: 24px; margin-bottom: 4px; }
    .merchant-name { text-align: center; font-size: 16px; color: #0070ba; font-weight: 600; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 32px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.08); margin-bottom: 20px; }
    .card h2 { font-size: 16px; margin-bottom: 16px; color: #555; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
    input[type="number"], input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; outline: none; transition: border .2s; }
    input:focus { border-color: #0070ba; }
    .amount-row { display: flex; gap: 12px; align-items: flex-end; }
    .amount-row .field { flex: 1; }
    .currency { width: 80px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; background: #f9f9f9; text-align: center; color: #555; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all .2s; }
    .btn-primary { background: #0070ba; color: #fff; margin-top: 16px; }
    .btn-primary:hover { background: #005ea6; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-reset { background: #eee; color: #666; margin-top: 8px; }
    .btn-reset:hover { background: #ddd; }
    .qr-section { text-align: center; display: none; }
    .qr-section canvas { margin: 16px auto; display: block; border: 8px solid #fff; box-shadow: 0 2px 16px rgba(0,0,0,.1); border-radius: 8px; }
    .qr-hint { font-size: 13px; color: #888; margin-top: 8px; }
    .order-id { font-size: 12px; color: #aaa; word-break: break-all; margin-top: 8px; }
    .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #ccc; border-top-color: #0070ba; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { background: #fff3f3; border: 1px solid #fcc; color: #c00; padding: 12px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: none; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 32px; max-width: 420px; width: 90%; text-align: center; animation: modalIn .3s ease; }
    @keyframes modalIn { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal .checkmark { width: 64px; height: 64px; border-radius: 50%; background: #d4edda; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .modal .checkmark svg { width: 32px; height: 32px; stroke: #155724; stroke-width: 3; fill: none; }
    .modal h3 { font-size: 22px; color: #155724; margin-bottom: 12px; }
    .modal .modal-info { text-align: left; background: #f8f9fa; border-radius: 8px; padding: 16px; margin: 16px 0; font-size: 14px; }
    .modal .modal-info .info-row { padding: 6px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
    .modal .modal-info .info-row:last-child { border-bottom: none; }
    .modal .modal-info .label { color: #888; white-space: nowrap; margin-right: 12px; }
    .modal .modal-info .value { font-weight: 600; text-align: right; word-break: break-all; }
    .modal .pickup-box { background: #fff8e1; border: 2px dashed #f9a825; border-radius: 12px; padding: 16px; margin: 12px 0; }
    .modal .pickup-label { font-size: 13px; color: #888; margin-bottom: 4px; }
    .modal .pickup-code { font-size: 48px; font-weight: 800; color: #e65100; letter-spacing: 8px; font-family: 'Courier New', monospace; }
    .btn-close-modal { background: #0070ba; color: #fff; border: none; padding: 14px 32px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn-close-modal:hover { background: #005ea6; }
    .back-link { display: inline-block; margin-bottom: 16px; color: #0070ba; text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">&larr; 返回平台首页</a>
    <h1>Offline Payment</h1>
    <div class="merchant-name" id="merchant-name"></div>
    <p class="subtitle">PayPal QR 扫码收款</p>

    <!-- Input Card -->
    <div class="card" id="input-card">
      <h2>收款信息</h2>
      <div class="amount-row">
        <div class="field">
          <label>金额</label>
          <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" autofocus>
        </div>
        <div>
          <label>货币</label>
          <div class="currency">USD</div>
        </div>
      </div>
      <div style="margin-top: 12px">
        <label>备注（可选）</label>
        <input type="text" id="description" placeholder="商品描述">
      </div>
      <button class="btn btn-primary" id="btn-generate" onclick="generateQR()">生成收款二维码</button>
      <div class="error-msg" id="error-msg"></div>
    </div>

    <!-- QR Card -->
    <div class="card qr-section" id="qr-card">
      <h2>请买家扫码支付</h2>
      <div id="qr-amount" style="font-size: 32px; font-weight: 700; color: #0070ba;"></div>
      <canvas id="qr-canvas"></canvas>
      <p class="qr-hint">使用 PayPal App 或手机浏览器扫描二维码完成支付</p>
      <p class="order-id" id="qr-order-id"></p>
      <p class="qr-watching" id="qr-watching"><span class="loading"></span>等待买家支付...</p>
      <button class="btn btn-reset" onclick="cancelOrder()">取消</button>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="modal-overlay" id="success-modal">
    <div class="modal">
      <div class="checkmark">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h3>支付成功</h3>
      <div class="modal-info" id="modal-info"></div>
      <button class="btn-close-modal" onclick="closeModal()">确认，生成新二维码</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const merchantId = params.get('id');
    let currentOrderId = null;
    let eventSource = null;

    if (!merchantId) {
      document.body.innerHTML = '<div style="text-align:center;padding:80px 16px;"><h2>缺少商户 ID</h2><p style="margin-top:12px;color:#888;">请从平台首页进入商户收款页面</p><a href="/" style="display:inline-block;margin-top:16px;color:#0070ba;">返回首页</a></div>';
    }

    // Load merchant name
    (async () => {
      try {
        const r = await fetch('/merchants');
        const merchants = await r.json();
        const m = merchants.find(x => x.merchantId === merchantId);
        if (m) {
          document.getElementById('merchant-name').textContent = m.name || merchantId;
          document.title = `${m.name || merchantId} — 收款`;
        }
      } catch (_) {}
    })();

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    async function generateQR() {
      const amount = document.getElementById('amount').value.trim();
      const description = document.getElementById('description').value.trim();

      if (!amount || isNaN(amount) || Number(amount) <= 0) {
        showError('请输入有效金额');
        return;
      }

      const btn = document.getElementById('btn-generate');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>生成中...';

      try {
        const r = await fetch('/create-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, description, merchantId }),
        });
        const data = await r.json();

        if (!r.ok || !data.approveUrl) {
          throw new Error(data.error?.message || JSON.stringify(data.error) || 'Failed to create order');
        }

        currentOrderId = data.orderId;

        // Generate QR with PayPal logo
        const canvas = document.getElementById('qr-canvas');
        await QRCode.toCanvas(canvas, data.approveUrl, {
          width: 280,
          margin: 2,
          errorCorrectionLevel: 'H',
          color: { dark: '#000', light: '#fff' },
        });
        const ctx = canvas.getContext('2d');
        const logoSize = 56;
        const x = (canvas.width - logoSize) / 2;
        const y = (canvas.height - logoSize) / 2;
        const pad = 6;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.roundRect(x - pad, y - pad, logoSize + pad * 2, logoSize + pad * 2, 8);
        ctx.fill();
        const logo = new Image();
        logo.crossOrigin = 'anonymous';
        logo.src = 'https://www.paypalobjects.com/webstatic/icon/pp258.png';
        await new Promise((resolve) => { logo.onload = resolve; logo.onerror = resolve; });
        ctx.drawImage(logo, x, y, logoSize, logoSize);

        console.log(`[Payment Link] ${data.approveUrl}`);
        document.getElementById('qr-amount').textContent = `$${Number(amount).toFixed(2)}`;
        document.getElementById('qr-order-id').textContent = `Order: ${data.orderId}`;
        document.getElementById('qr-card').style.display = 'block';
        document.getElementById('input-card').style.display = 'none';

        watchOrder(data.orderId);
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '生成收款二维码';
      }
    }

    function watchOrder(orderId) {
      if (eventSource) eventSource.close();
      eventSource = new EventSource(`/order-watch/${orderId}`);
      eventSource.onmessage = (e) => {
        const order = JSON.parse(e.data);
        if (order.status === 'COMPLETED') {
          eventSource.close();
          eventSource = null;
          showSuccessModal(order);
        } else if (order.status === 'TIMEOUT') {
          eventSource.close();
          eventSource = null;
          showError('等待支付超时，请重新生成二维码');
          resetAll();
        }
      };
      eventSource.onerror = () => {};
    }

    function showSuccessModal(order) {
      const pu = order.purchase_units?.[0];
      const capture = pu?.payments?.captures?.[0];
      const amt = capture?.amount || pu?.amount;
      const payer = order.payer;

      let html = '';
      if (order.pickupCode) {
        html += `<div class="pickup-box"><div class="pickup-label">取货码</div><div class="pickup-code">${order.pickupCode}</div></div>`;
      }
      html += '<div class="modal-info" style="margin:0">';
      if (amt) html += `<div class="info-row"><span class="label">金额</span><span class="value">${amt.value} ${amt.currency_code}</span></div>`;
      html += `<div class="info-row"><span class="label">订单号</span><span class="value">${order.id}</span></div>`;
      if (payer?.name) html += `<div class="info-row"><span class="label">付款人</span><span class="value">${payer.name.given_name || ''} ${payer.name.surname || ''}</span></div>`;
      if (payer?.email_address) html += `<div class="info-row"><span class="label">邮箱</span><span class="value">${payer.email_address}</span></div>`;
      if (capture?.create_time) html += `<div class="info-row"><span class="label">时间</span><span class="value">${new Date(capture.create_time).toLocaleString()}</span></div>`;
      html += '</div>';

      document.getElementById('modal-info').innerHTML = html;
      document.getElementById('success-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('success-modal').classList.remove('active');
      resetAll();
    }

    async function cancelOrder() {
      if (currentOrderId) {
        await fetch(`/cancel-order/${currentOrderId}`, { method: 'POST' });
      }
      resetAll();
    }

    function resetAll() {
      if (eventSource) { eventSource.close(); eventSource = null; }
      currentOrderId = null;
      document.getElementById('amount').value = '';
      document.getElementById('description').value = '';
      document.getElementById('input-card').style.display = 'block';
      document.getElementById('qr-card').style.display = 'none';
      document.getElementById('amount').focus();
    }

    document.getElementById('amount')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') generateQR();
    });
  </script>
</body>
</html>
