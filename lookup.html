<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>查询取货码</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
    .card { background: #fff; border-radius: 16px; padding: 40px 32px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
    h2 { color: #333; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
    input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border .2s; }
    input:focus { border-color: #0070ba; }
    .btn { width: 100%; padding: 14px; background: #0070ba; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; transition: background .2s; }
    .btn:hover { background: #005ea6; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .result { margin-top: 20px; display: none; }
    .pickup-box { background: #fff8e1; border: 2px dashed #f9a825; border-radius: 12px; padding: 20px; }
    .pickup-label { font-size: 13px; color: #888; margin-bottom: 4px; }
    .pickup-code { font-size: 48px; font-weight: 800; color: #e65100; letter-spacing: 8px; font-family: 'Courier New', monospace; }
    .error { background: #fff3f3; border: 1px solid #fcc; color: #c00; padding: 12px; border-radius: 8px; font-size: 14px; margin-top: 16px; display: none; }
    .hint { color: #aaa; font-size: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>查询取货码</h2>
    <p class="subtitle">输入 PayPal 订单号查询</p>
    <input type="text" id="order-id" placeholder="订单号（如 4KG36XXX...）" autofocus>
    <button class="btn" id="btn-lookup" onclick="lookup()">查询</button>
    <div class="error" id="error"></div>
    <div class="result" id="result">
      <div class="pickup-box">
        <div class="pickup-label">取货码</div>
        <div class="pickup-code" id="code"></div>
      </div>
      <p class="hint">请向商家出示取货码</p>
    </div>
  </div>
  <script>
    document.getElementById('order-id').addEventListener('keydown', e => {
      if (e.key === 'Enter') lookup();
    });

    async function lookup() {
      const orderId = document.getElementById('order-id').value.trim();
      if (!orderId) return;

      const btn = document.getElementById('btn-lookup');
      const errEl = document.getElementById('error');
      const resultEl = document.getElementById('result');
      btn.disabled = true;
      btn.textContent = '查询中...';
      errEl.style.display = 'none';
      resultEl.style.display = 'none';

      try {
        const r = await fetch('/pickup-code/' + orderId);
        if (r.ok) {
          const data = await r.json();
          document.getElementById('code').textContent = data.pickupCode;
          resultEl.style.display = 'block';
        } else {
          errEl.textContent = '未找到取货码，请确认订单号是否正确';
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.textContent = '查询失败，请重试';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '查询';
      }
    }
  </script>
</body>
</html>
